<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="starGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#88c0d0"/>
      <stop offset="100%" stop-color="#5e81ac"/>
    </linearGradient>
    <linearGradient id="rayGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#88c0d0" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#5e81ac" stop-opacity="0.35"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="#e0e5ec"/>

  <!-- Neumorphic shadow: dark bottom-right -->
  <rect x="8" y="8" width="496" height="496" rx="92"
        fill="none" stroke="rgba(163,177,198,0.4)" stroke-width="0"/>

  <!-- Subtle neumorphic circle well -->
  <circle cx="256" cy="256" r="160" fill="none"
          stroke="rgba(255,255,255,0.7)" stroke-width="2"/>
  <circle cx="256" cy="256" r="158" fill="none"
          stroke="rgba(163,177,198,0.3)" stroke-width="2"/>

  <!-- Outer rays (long, soft) -->
  <g filter="url(#glow)" opacity="0.55">
    <!-- 8 main rays at 45° intervals, varied lengths -->
    <line x1="256" y1="256" x2="256" y2="78"  stroke="url(#rayGrad)" stroke-width="10" stroke-linecap="round"/>
    <line x1="256" y1="256" x2="382" y2="130" stroke="url(#rayGrad)" stroke-width="9"  stroke-linecap="round"/>
    <line x1="256" y1="256" x2="434" y2="256" stroke="url(#rayGrad)" stroke-width="10" stroke-linecap="round"/>
    <line x1="256" y1="256" x2="382" y2="382" stroke="url(#rayGrad)" stroke-width="9"  stroke-linecap="round"/>
    <line x1="256" y1="256" x2="256" y2="434" stroke="url(#rayGrad)" stroke-width="10" stroke-linecap="round"/>
    <line x1="256" y1="256" x2="130" y2="382" stroke="url(#rayGrad)" stroke-width="9"  stroke-linecap="round"/>
    <line x1="256" y1="256" x2="78"  y2="256" stroke="url(#rayGrad)" stroke-width="10" stroke-linecap="round"/>
    <line x1="256" y1="256" x2="130" y2="130" stroke="url(#rayGrad)" stroke-width="9"  stroke-linecap="round"/>
  </g>

  <!-- Inner short rays (between the main 8) -->
  <g opacity="0.3">
    <line x1="256" y1="256" x2="332" y2="100" stroke="url(#rayGrad)" stroke-width="6" stroke-linecap="round"/>
    <line x1="256" y1="256" x2="412" y2="192" stroke="url(#rayGrad)" stroke-width="6" stroke-linecap="round"/>
    <line x1="256" y1="256" x2="412" y2="320" stroke="url(#rayGrad)" stroke-width="6" stroke-linecap="round"/>
    <line x1="256" y1="256" x2="332" y2="412" stroke="url(#rayGrad)" stroke-width="6" stroke-linecap="round"/>
    <line x1="256" y1="256" x2="180" y2="412" stroke="url(#rayGrad)" stroke-width="6" stroke-linecap="round"/>
    <line x1="256" y1="256" x2="100" y2="320" stroke="url(#rayGrad)" stroke-width="6" stroke-linecap="round"/>
    <line x1="256" y1="256" x2="100" y2="192" stroke="url(#rayGrad)" stroke-width="6" stroke-linecap="round"/>
    <line x1="256" y1="256" x2="180" y2="100" stroke="url(#rayGrad)" stroke-width="6" stroke-linecap="round"/>
  </g>

  <!-- 5-point star (the hero element) -->
  <g filter="url(#glow)">
    <polygon
      points="
        256,148
        283,218
        358,218
        299,262
        318,334
        256,290
        194,334
        213,262
        154,218
        229,218
      "
      fill="url(#starGrad)"
      stroke="none"
    />
  </g>

  <!-- Inner star highlight -->
  <polygon
    points="
      256,170
      276,222
      334,222
      288,256
      303,310
      256,276
      209,310
      224,256
      178,222
      236,222
    "
    fill="rgba(255,255,255,0.2)"
    stroke="none"
  />

  <!-- Tiny sparkle dots -->
  <circle cx="340" cy="140" r="5" fill="#88c0d0" opacity="0.5"/>
  <circle cx="150" cy="160" r="3.5" fill="#88c0d0" opacity="0.4"/>
  <circle cx="390" cy="340" r="4" fill="#5e81ac" opacity="0.35"/>
  <circle cx="120" cy="360" r="3" fill="#88c0d0" opacity="0.3"/>
</svg>
