<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a0a2e"/>
      <stop offset="100%" stop-color="#0d0a1a"/>
    </linearGradient>
    <linearGradient id="starGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c4b5fd"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="orbitGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a78bfa" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0.15"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>

  <!-- Ambient glow -->
  <circle cx="256" cy="256" r="140" fill="#8b5cf6" opacity="0.06" filter="url(#softGlow)"/>

  <!-- Orbit rings -->
  <ellipse cx="256" cy="256" rx="170" ry="170" fill="none"
           stroke="url(#orbitGrad)" stroke-width="1.5" opacity="0.4"/>
  <ellipse cx="256" cy="256" rx="120" ry="120" fill="none"
           stroke="url(#orbitGrad)" stroke-width="1" opacity="0.25"/>

  <!-- Tiny stars -->
  <circle cx="100" cy="100" r="2" fill="#c4b5fd" opacity="0.6"/>
  <circle cx="400" cy="90" r="1.5" fill="#c4b5fd" opacity="0.4"/>
  <circle cx="420" cy="380" r="2" fill="#a78bfa" opacity="0.5"/>
  <circle cx="80" cy="400" r="1.5" fill="#c4b5fd" opacity="0.35"/>
  <circle cx="350" cy="150" r="1" fill="#e9d5ff" opacity="0.5"/>
  <circle cx="150" cy="360" r="1" fill="#e9d5ff" opacity="0.4"/>
  <circle cx="320" cy="420" r="1.5" fill="#c4b5fd" opacity="0.3"/>
  <circle cx="180" cy="120" r="1" fill="#e9d5ff" opacity="0.45"/>

  <!-- 5-point star (hero) -->
  <g filter="url(#glow)">
    <polygon
      points="
        256,128
        290,210
        378,210
        308,262
        330,346
        256,294
        182,346
        204,262
        134,210
        222,210
      "
      fill="url(#starGrad)"
    />
  </g>

  <!-- Inner highlight -->
  <polygon
    points="
      256,158
      280,218
      346,218
      294,256
      312,320
      256,280
      200,320
      218,256
      166,218
      232,218
    "
    fill="rgba(255,255,255,0.12)"
  />

  <!-- Shooting star accent -->
  <line x1="360" y1="100" x2="420" y2="70" stroke="#c4b5fd" stroke-width="2"
        stroke-linecap="round" opacity="0.6" filter="url(#glow)"/>
  <circle cx="360" cy="100" r="2.5" fill="#e9d5ff" opacity="0.8"/>
</svg>
